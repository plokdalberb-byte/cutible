version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CUTIBLE_API_KEY=${CUTIBLE_API_KEY:-}
      - CUTIBLE_CORS_ORIGINS=${CUTIBLE_CORS_ORIGINS:-*}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - VLM_API_KEY=${VLM_API_KEY:-}
      - PYANNOTE_TOKEN=${PYANNOTE_TOKEN:-}
    volumes:
      - .cutible:/app/.cutible
      - ./media:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: ["python", "-m", "cutible.render_farm.remote"]
    ports:
      - "8001:8001"
    environment:
      - CUTIBLE_API_KEY=${CUTIBLE_API_KEY:-}
    volumes:
      - .cutible:/app/.cutible
      - ./media:/app/media
    profiles:
      - distributed
